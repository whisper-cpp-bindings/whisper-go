name: Build Static Libraries

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'build.sh'
      - 'Dockerfile'
      - 'whisper/internal/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-linux-x86-64:
    name: Build Linux x86_64 (CPU + CUDA)
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: whisper-go:ubuntu24.04-cuda12.0
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract build artifacts
        run: |
          mkdir -p /tmp/artifacts
          docker run --rm -v /tmp/artifacts:/output \
            whisper-go:ubuntu24.04-cuda12.0 \
            bash -c "cp -r whisper/internal/static-lfs/* /output/ || true"
          
          echo "=== Build Artifacts ==="
          ls -lah /tmp/artifacts/
          if [ -d "/tmp/artifacts/linux_x86_64_cpu" ]; then
            echo ""
            echo "=== Linux x86_64 CPU ==="
            ls -lah /tmp/artifacts/linux_x86_64_cpu/
          fi
          if [ -d "/tmp/artifacts/linux_x86_64_cuda" ]; then
            echo ""
            echo "=== Linux x86_64 CUDA ==="
            ls -lah /tmp/artifacts/linux_x86_64_cuda/
          fi

      - name: Verify artifacts
        run: |
          set -e
          [ -f /tmp/artifacts/linux_x86_64_cpu/libwhisper.a ] || (echo "CPU lib missing" && exit 1)
          [ -f /tmp/artifacts/linux_x86_64_cpu/whisper.h ] || (echo "CPU header missing" && exit 1)
          [ -f /tmp/artifacts/linux_x86_64_cuda/libwhisper.a ] || (echo "CUDA lib missing" && exit 1)
          [ -f /tmp/artifacts/linux_x86_64_cuda/whisper.h ] || (echo "CUDA header missing" && exit 1)
          echo "✓ All build artifacts verified"

      - name: Upload artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: whisper-static-libs-linux-x86_64
          path: /tmp/artifacts/
          retention-days: 30

  verify-go-build:
    name: Verify Go bindings
    runs-on: ubuntu-latest
    needs: build-linux-x86-64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: whisper-static-libs-linux-x86_64
          path: ./whisper/internal/static-lfs/

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Verify Go fmt
        run: go fmt ./...

      - name: Run Go vet
        run: go vet ./...

      - name: List Go build artifacts  
        run: |
          echo "=== Available Go files ==="
          ls -la whisper/internal/*.go
          echo ""
          echo "=== Checking build tags ==="
          grep -h "^//go:build" whisper/internal/*.go | sort -u || true
